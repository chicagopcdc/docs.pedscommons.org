name: Document Notifications

on:
  push:
    branches:
      - main
    paths:
      - 'docs/AcceptableUsePolicy.md'
      - 'docs/DataPortalUserGuide.md'
      - 'docs/index.md'
      - 'docs/PcdcPrivacyNotice.md'
      - 'docs/StatisticalManual.md'
      - 'docs/TermsAndConditions.md'

  workflow_dispatch:

concurrency:
  group: document-notifications
  cancel-in-progress: true

jobs:
  notify:
    name: Notify Changed Documents
    runs-on: ubuntu-latest

    outputs:
      changed_files: ${{ steps.changed.outputs.files }}

    env:
      EMAIL_RECIPIENTS: ${{ secrets.EMAILLIST }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine changed files
        id: changed
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FILES=""
          else
            FILES=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")
          fi

          echo "Changed files:"
          echo "$FILES"

          if [ -z "$FILES" ]; then
            echo "files=" >> "$GITHUB_OUTPUT"
          else
            {
              echo "files<<EOF"
              echo "$FILES"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Send notification email
        if: steps.changed.outputs.files != '' && steps.changed.outputs.files != 'null'
        uses: cinotify/github-action@v1.1.0
        with:
          to: ${{ env.EMAIL_RECIPIENTS }}
          subject: Documentation Updated
          body: |
            The following document(s) were updated in ${{ github.repository }}:

            ${{ steps.changed.outputs.files }}

            Commit:
            https://github.com/${{ github.repository }}/commit/${{ github.sha }}

  register-documents:
    name: Register Portal Documents
    runs-on: ubuntu-latest
    needs: notify

    strategy:
      fail-fast: false
      matrix:
        include:
          - file: docs/AcceptableUsePolicy.md
            type: portal-acceptable-use-policy
            version: 1
            name: Data Portal Acceptable Use Policy
            raw: https://github.com/chicagopcdc/docs.pedscommons.org/blob/main/docs/AcceptableUsePolicy.md
            formatted: https://docs.pedscommons.org/AcceptableUsePolicy/
            required: true

          - file: docs/PcdcPrivacyNotice.md
            type: privacy-policy
            version: 1
            name: PCDC Privacy Notice
            raw: https://github.com/chicagopcdc/docs.pedscommons.org/blob/main/docs/PcdcPrivacyNotice.md
            formatted: https://docs.pedscommons.org/PcdcPrivacyNotice/
            required: true

          - file: docs/TermsAndConditions.md
            type: terms-and-conditions
            version: 1
            name: Terms and Conditions
            raw: https://github.com/chicagopcdc/docs.pedscommons.org/blob/main/docs/TermsAndConditions.md
            formatted: https://docs.pedscommons.org/TermsAndConditions/
            required: true

    env:
      APIKEY: ${{ secrets.APIKEY }}
      KEYID: ${{ secrets.KEYID }}
      REQUESTURL: ${{ secrets.REQUESTURL }}
      PORTAL_API_URL: ${{ secrets.PORTAL_API_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if document changed
        id: check-document
        shell: bash
        run: |
          CHANGED_FILES="${{ needs.notify.outputs.changed_files }}"
          
          # Check if the current matrix file is in the changed files list
          if echo "$CHANGED_FILES" | grep -Fxq "${{ matrix.file }}"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Document ${{ matrix.file }} has changed"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Document ${{ matrix.file }} has not changed or no files changed"
          fi

      - name: Setup Python
        if: steps.check-document.outputs.changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.check-document.outputs.changed == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Generate API token
        if: steps.check-document.outputs.changed == 'true'
        id: token-gen
        run: python .github/workflows/key.py
        env:
          APIKEY: ${{ env.APIKEY }}
          KEYID: ${{ env.KEYID }}
          REQUESTURL: ${{ env.REQUESTURL }}

      - name: Verify token generation
        if: steps.check-document.outputs.changed == 'true'
        shell: bash
        run: |
          if [ -z "${TOKEN}" ]; then
            echo "ERROR: Token was not generated successfully"
            exit 1
          fi
          echo "Token generated successfully! Token length: {len(token)} characters."
        # env:
        #   TOKEN: ${{ env.TOKEN }}

      # - name: Install jq
      #   run: sudo apt-get update && sudo apt-get install -y jq

      - name: Create document payload
        if: steps.check-document.outputs.changed == 'true'
        id: create-payload
        shell: bash
        run: |
          cat > payload.json <<EOF
          {
            "type": "${{ matrix.type }}",
            "version": ${{ matrix.version }},
            "name": "${{ matrix.name }}",
            "raw": "${{ matrix.raw }}",
            "formatted": "${{ matrix.formatted }}",
            "required": ${{ matrix.required }}
          }
          EOF
          
          echo "Created payload:"
          cat payload.json
          
          # Validate JSON
          if ! jq empty payload.json 2>/dev/null; then
            echo "ERROR: Invalid JSON payload"
            exit 1
          fi
          echo "Payload is valid JSON"

      - name: Register document
        if: steps.check-document.outputs.changed == 'true'
        shell: bash
        run: |
          # Log the API call (without exposing sensitive data)
          echo "Registering document: ${{ matrix.name }}"
          echo "API URL: ${{ env.PORTAL_API_URL }}/user/admin/add_document"
          
          # Make the API call
          RESPONSE=$(curl \
            --fail \
            --show-error \
            --location \
            --write-out "\nHTTP_STATUS:%{http_code}" \
            --request POST \
            --header "Content-Type: application/json" \
            --header "Authorization: Bearer ${TOKEN}" \
            --data @payload.json \
            ${{ env.PORTAL_API_URL }}/user/admin/add_document 2>&1)
          
          CURL_EXIT=$?
          
          # Extract HTTP status from response
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          RESPONSE_BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
          
          echo "Response body: $RESPONSE_BODY"
          echo "HTTP Status: $HTTP_STATUS"
          
          if [ $CURL_EXIT -ne 0 ] || [ "$HTTP_STATUS" -ne 200 ]; then
            echo "ERROR: Document registration failed"
            echo "Curl exit code: $CURL_EXIT"
            echo "HTTP Status: $HTTP_STATUS"
            exit 1
          fi
          
          echo "Document registered successfully"
        # env:
        #   TOKEN: ${{ env.TOKEN }}

      - name: Cleanup token
        if: always() && steps.check-document.outputs.changed == 'true'
        shell: bash
        run: |
          # Clear the token from environment
          unset TOKEN
          echo "Token cleared from environment"